<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For My Shreya ❤️</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ffd6e7,#ffeef6,#fff6fb);
overflow:hidden;
}

.card{
background:white;
width:90%;
max-width:380px;
padding:35px 25px;
border-radius:25px;
text-align:center;
box-shadow:0 10px 30px rgba(255,105,180,.2);
animation:fade 1.2s ease;
}

h1{
color:#ff4f8b;
font-size:34px;
margin-bottom:15px;
}

p{
color:#555;
font-size:19px;
line-height:1.6;
margin-bottom:18px;
}

button{
margin-top:10px;
padding:15px 35px;
font-size:18px;
border:none;
border-radius:30px;
background:#ff5c9a;
color:white;
cursor:pointer;
}

@keyframes fade{
from{
opacity:0;
transform:translateY(25px);
}
to{
opacity:1;
transform:translateY(0);
}
}
</style>

</head>

<body>

<div class="card">

<h1>Hi Shreya... ❤️</h1>

<p>Before you continue...</p>

<p>I made every part of this little surprise only for you. 💖</p>

<button onclick="alert('The next surprise is coming soon ❤️')">
Continue ❤️
</button>

</div>

</body>
</html>

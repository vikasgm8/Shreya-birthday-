<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For My Shreya ❤️</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ffe0ec,#ffd6e7,#fff5f8);
overflow:hidden;
}

.card{
background:white;
width:90%;
max-width:380px;
padding:35px;
border-radius:25px;
box-shadow:0 10px 30px rgba(255,105,180,.25);
text-align:center;
animation:fadeIn 1s ease;
}

h1{
color:#ff4f87;
font-size:34px;
margin-bottom:18px;
}

p{
font-size:20px;
color:#555;
line-height:1.6;
margin-bottom:18px;
}

button{
background:#ff4f87;
color:white;
border:none;
padding:15px 35px;
font-size:19px;
border-radius:30px;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:scale(1.05);
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(30px);
}
to{
opacity:1;
transform:translateY(0);
}
}
</style>
</head>

<body>

<div class="card">
<h1>Hi Shreya... ❤️</h1>

<p>Before you continue...</p>

<p>I made every part of this little surprise only for you. 🥹💖</p>

<button onclick="alert('The next surprise is waiting ❤️')">
Continue ❤️
</button>
</div>

</body>
</html>
